<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Listora</title>
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.webmanifest?v=1.3.8-listora-greenfix" />
  <link rel="stylesheet" href="style.css?v=1.3.8-listora-greenfix" />
</head>
<body>
  <header class="topbar">
    <div class="brand-box">
      <h1 class="brand-title">LISTORA</h1>
      <p class="brand-subtitle" data-i18n="title">Your Shopping List App</p>
    </div>
    <button id="settingsBtn" class="settings-btn" type="button" aria-label="Settings">⚙️</button>
  </header>

  <main class="app">
    <section class="card form-card">
      <h2 data-i18n="addTitle">Add product</h2>
      <form id="itemForm">
        <div class="field"><label for="name" data-i18n="productName">Product</label><input id="name" type="text" autocomplete="off" required /></div>
        <div class="grid-2">
          <div class="field"><label for="price" data-i18n="priceOne">Price for 1 item</label><input id="price" type="number" min="0" step="0.01" /></div>
          <div class="field"><label for="quantity" data-i18n="quantity">Quantity</label><input id="quantity" type="number" min="1" step="1" value="1" required /></div>
        </div>
        <button type="submit" class="primary-btn" data-i18n="addButton">+ Add</button>
      </form>
    </section>

    <section class="summary">
      <div class="summary-card"><span data-i18n="totalItems">Total quantity</span><strong id="totalItems">0</strong></div>
      <div class="summary-card"><span data-i18n="boughtItems">Bought quantity</span><strong id="boughtItems">0</strong></div>
      <div class="summary-card total-money"><span data-i18n="spent">Spent</span><strong id="spentMoney">0</strong></div>
    </section>

    <section class="list-section">
      <div class="section-head"><h2 data-i18n="listTitle">Products</h2><button id="clearBtn" class="ghost-btn" data-i18n="clear">Clear</button></div>
      <div id="emptyState" class="empty" data-i18n="empty">No products yet.</div>
      <div id="itemsList" class="items-list"></div>
    </section>

    <section class="card purchase-card">
      <h2 data-i18n="purchaseTitle">Complete purchase</h2>
      <div class="grid-2">
        <div class="field"><label for="storeName" data-i18n="storeName">Store</label><input id="storeName" type="text" list="storesList" autocomplete="off" placeholder="Lidl" /><datalist id="storesList"></datalist></div>
        <div class="field"><label for="purchaseDate" data-i18n="purchaseDate">Date</label><input id="purchaseDate" type="date" /></div>
      </div>
      <button id="savePurchaseBtn" class="secondary-btn" type="button" data-i18n="savePurchase">Save checked items to history</button>
      <p id="purchaseStatus" class="purchase-status" aria-live="polite"></p>
      <button id="openHistoryBtn" class="primary-btn" type="button" data-i18n="openHistory">Purchase history</button>
    </section>
  </main>

  <footer class="app-footer"><p>Listora</p><p>v1.3.8</p><p>Adam Margoev</p></footer>

  <div id="settingsPanel" class="settings-panel" aria-hidden="true"><div class="settings-sheet"></div></div>
  <div id="historyPanel" class="settings-panel" aria-hidden="true"><div class="settings-sheet history-sheet"></div></div>
  <div id="printArea" class="print-area"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(reg => reg.update()));
    }
  </script>
  <script src="script.js?v=1.3.8-listora-greenfix"></script>
  <script src="patch-v1.3.6.js?v=1.3.8-listora-greenfix"></script>
  <script src="settings-v1.3.8.js?v=1.3.8-listora-greenfix"></script>
  <script src="contrast-fix-v1.3.8.js?v=1.3.8-listora-greenfix"></script>
</body>
</html>
